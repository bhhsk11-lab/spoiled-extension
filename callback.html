<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Spoiled – Connecting…</title>
  <style>
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0e0e14; color: #e8e8f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }
    .card {
      text-align: center; padding: 40px 48px;
      background: #16161f; border: 1px solid #2a2a3a;
      border-radius: 16px; max-width: 400px;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h2 { font-size: 20px; font-weight: 600; margin: 0 0 8px; }
    p  { font-size: 14px; color: #666; margin: 0; line-height: 1.5; }
    .ok   { color: #22c55e; }
    .fail { color: #ef4444; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🛡️</div>
  <h2 id="title">Connecting to Google Drive…</h2>
  <p id="msg">Please wait, do not close this tab.</p>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');

  if (error) {
    document.getElementById('title').textContent = 'Connection failed';
    document.getElementById('title').className   = 'fail';
    document.getElementById('msg').textContent   = 'Error: ' + error + '. Please close this tab and try again.';
  } else if (code) {
    document.getElementById('title').textContent = 'Connected!';
    document.getElementById('title').className   = 'ok';
    document.getElementById('msg').textContent   = 'Google Drive connected. This tab will close automatically.';
  } else {
    document.getElementById('title').textContent = 'Something went wrong';
    document.getElementById('title').className   = 'fail';
    document.getElementById('msg').textContent   = 'No authorization code received. Please try again.';
  }
</script>
</body>
</html>
